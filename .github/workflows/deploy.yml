name: Deploy to Windows Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy Bot
    runs-on: ubuntu-latest

    steps:
      - name: Decode WA session zip on runner
        run: echo "${{ secrets.WA_SESSION_B64 }}" | base64 -d > wa_session.zip

      - name: Copy WA session zip to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "wa_session.zip"
          target: "C:/upwork-outbound-agent/whatsapp_bridge"

      - name: Deploy via SSH to Windows
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          timeout: 300s
          command_timeout: 15m
          script: |
            if not exist C:\upwork-outbound-agent\whatsapp_bridge\session\creds.json (
                cd C:\upwork-outbound-agent\whatsapp_bridge
                powershell -Command "Expand-Archive -Path wa_session.zip -DestinationPath . -Force"
                echo WA session restored from secret
            )
            if exist C:\upwork-outbound-agent\whatsapp_bridge\wa_session.zip (
                del C:\upwork-outbound-agent\whatsapp_bridge\wa_session.zip
            )
            cd C:\upwork-outbound-agent
            git fetch origin main
            git reset --hard origin/main
            python -m pip install "requests-toolbelt>=1.0.0" --prefer-binary -q
            python -m pip install --prefer-binary -r requirements.txt -q
            cd C:\upwork-outbound-agent\whatsapp_bridge
            npm install --omit=dev --quiet
            cd C:\upwork-outbound-agent
            sc stop upwork-outbound-agent || echo Service was not running
            ping -n 5 127.0.0.1
            sc start upwork-outbound-agent
            ping -n 12 127.0.0.1
            sc query upwork-outbound-agent
