name: Deploy to Contabo

on:
  push:
    branches: [bhw_bot]

jobs:
  deploy:
    name: Deploy Bot
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: ENV_FILE_CONTENT
          script_stop: true
          timeout: 180s
          command_timeout: 10m
          script: |
            APP_DIR="/opt/upwork-outbound-agent"
            echo "▶ Starting deployment..."
            test -d "$APP_DIR" && echo "▶ Repo exists, pulling..." || git clone -b bhw_bot https://github.com/zeeshana1233/upwork-outbound-agent.git "$APP_DIR"
            cd "$APP_DIR"
            git fetch origin bhw_bot
            git reset --hard origin/bhw_bot
            test -d "$APP_DIR/venv" || python3 -m venv "$APP_DIR/venv"
            . "$APP_DIR/venv/bin/activate"
            pip install --upgrade pip -q
            pip install -r requirements.txt -q
            echo "▶ Dependencies installed"
            printf '%s\n' "$ENV_FILE_CONTENT" > "$APP_DIR/.env"
            chmod 600 "$APP_DIR/.env"
            echo "▶ .env written"
            cp "$APP_DIR/deploy/upwork-bot.service" /etc/systemd/system/upwork-bot.service
            systemctl daemon-reload
            systemctl enable upwork-bot.service
            systemctl restart upwork-bot.service
            echo "▶ Service restarted, waiting 8s..."
            sleep 8
            systemctl is-active upwork-bot.service
            echo "✅ Bot is running!"
            journalctl -u upwork-bot.service -n 20 --no-pager
