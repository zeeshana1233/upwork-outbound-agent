name: Deploy to Windows Server

on:
  push:
    branches: [bhw_bot]

jobs:
  deploy:
    name: Deploy Bot
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH to Windows
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          timeout: 300s
          command_timeout: 15m
          script: |
            cd C:\upwork-outbound-agent
            git fetch origin bhw_bot
            git reset --hard origin/bhw_bot
            python -m pip install "requests-toolbelt>=1.0.0" --prefer-binary -q
            python -m pip install --prefer-binary -r requirements.txt -q
            sc stop upwork-outbound-agent || echo Service was not running
            ping -n 5 127.0.0.1
            sc start upwork-outbound-agent
            ping -n 12 127.0.0.1
            sc query upwork-outbound-agent
