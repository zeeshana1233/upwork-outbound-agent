name: Deploy to Windows Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy Bot
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH to Windows
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          timeout: 300s
          command_timeout: 15m
          envs: WA_SESSION_P1,WA_SESSION_P2,WA_SESSION_P3
          script: |
            if not exist C:\upwork-outbound-agent\whatsapp_bridge\session\creds.json (
                powershell -Command "& { $b64 = $env:WA_SESSION_P1 + $env:WA_SESSION_P2 + $env:WA_SESSION_P3; $bytes = [Convert]::FromBase64String($b64); [IO.File]::WriteAllBytes('C:\upwork-outbound-agent\whatsapp_bridge\wa_session.zip', $bytes) }"
                powershell -Command "Expand-Archive -Path C:\upwork-outbound-agent\whatsapp_bridge\wa_session.zip -DestinationPath C:\upwork-outbound-agent\whatsapp_bridge -Force"
                del C:\upwork-outbound-agent\whatsapp_bridge\wa_session.zip
                echo WA session restored
            )
            cd C:\upwork-outbound-agent
            git fetch origin main
            git reset --hard origin/main
            python -m pip install "requests-toolbelt>=1.0.0" --prefer-binary -q
            python -m pip install --prefer-binary -r requirements.txt -q
            cd C:\upwork-outbound-agent\whatsapp_bridge
            npm install --omit=dev --quiet
            cd C:\upwork-outbound-agent
            sc stop upwork-outbound-agent || echo Service was not running
            ping -n 5 127.0.0.1
            sc start upwork-outbound-agent
            ping -n 12 127.0.0.1
            sc query upwork-outbound-agent
        env:
          WA_SESSION_P1: ${{ secrets.WA_SESSION_P1 }}
          WA_SESSION_P2: ${{ secrets.WA_SESSION_P2 }}
          WA_SESSION_P3: ${{ secrets.WA_SESSION_P3 }}
